<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>MineClone Retro - Bedwars</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 8px; height: 8px; background: white;
            border-radius: 50%; transform: translate(-50%, -50%);
            z-index: 10; pointer-events: none; border: 1px solid black;
        }
        #error-msg { color: white; position: absolute; top: 10px; left: 10px; font-family: sans-serif; display: none; }
    </style>
</head>
<body>
    <div id="error-msg">Erro ao carregar 3D. Tente outro navegador.</div>
    <div id="crosshair"></div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.128.0/build/three.module.js';
        import { PointerLockControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/PointerLockControls.js';

        let scene, camera, renderer, controls;

        function init() {
            try {
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x87CEEB);

                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
                camera.position.set(0, 2, 5);

                // CONFIGURAÇÃO CRÍTICA PARA INTEL ANTIGA
                renderer = new THREE.WebGLRenderer({ 
                    antialias: false,
                    precision: "lowp", // Menor precisão para não travar
                    powerPreference: "high-performance"
                });
                
                renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.appendChild(renderer.domElement);

                // Chão de teste (Apenas 8x8 blocos para ser ultra leve)
                const geometry = new THREE.BoxGeometry(1, 1, 1);
                const material = new THREE.MeshBasicMaterial({ color: 0x48a044 });

                for (let x = -4; x < 4; x++) {
                    for (let z = -4; z < 4; z++) {
                        const cube = new THREE.Mesh(geometry, material);
                        cube.position.set(x, 0, z);
                        scene.add(cube);
                    }
                }

                controls = new PointerLockControls(camera, document.body);
                document.addEventListener('click', () => controls.lock());

                animate();
            } catch (err) {
                console.error(err);
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if(renderer) renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
