<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>MineClone - Versão Compatível</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; background: white;
            border-radius: 50%; transform: translate(-50%, -50%);
            z-index: 10; pointer-events: none; border: 1px solid black;
        }
    </style>
</head>
<body>
    <div id="crosshair"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.150.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.150.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // Tentar criar o renderizador com configurações de compatibilidade
        let renderer;
        try {
            renderer = new THREE.WebGLRenderer({ 
                antialias: false, // Desativado para economizar recursos
                precision: "mediump" // Menor precisão para placas antigas
            });
        } catch (e) {
            alert("Seu navegador ou placa de vídeo não suporta WebGL.");
        }

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Usar luz simples
        const light = new THREE.AmbientLight(0xffffff, 1);
        scene.add(light);

        // Chão simples (Menos blocos para não travar o PC antigo)
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        for (let x = -5; x < 5; x++) {
            for (let z = -5; z < 5; z++) {
                // MeshBasicMaterial é o mais leve que existe
                const material = new THREE.MeshBasicMaterial({ color: 0x48a044 });
                const cube = new THREE.Mesh(geometry, material);
                cube.position.set(x, 0, z);
                scene.add(cube);
            }
        }

        const controls = new PointerLockControls(camera, document.body);
        document.addEventListener('click', () => controls.lock());
        camera.position.set(0, 2, 5);

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
